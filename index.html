<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mint Scripts Studio | Maintenance</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --mint-color: #34d399; /* Тот самый ментоловый */
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            border-top: 4px solid var(--mint-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 { color: var(--mint-color); margin-bottom: 20px; font-size: 24px; letter-spacing: 1px; }
        p { color: var(--text-dim); line-height: 1.6; margin-bottom: 30px; }

        .contact-box {
            border: 1px solid #334155;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }

        a {
            color: var(--mint-color);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        
        a:hover { opacity: 0.8; }

        @media (max-width: 480px) {
            .container { padding: 25px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">Mint Scripts Studio</h1>
        <p id="text">Loading...</p>
        
        <div class="contact-box">
            <p id="contact-text" style="margin-bottom: 10px;"></p>
            <a href="https://t.me/mintscripts">@mintscripts</a><br>
            <a href="https://t.me/mintscripts_studio">@mintscripts_studio</a>
        </div>
    </div>

    <script>
        const content = {
            ru: {
                text: "На наших серверах проводятся плановые технические работы по обновлению инфраструктуры. Скоро мы вернемся в строй.",
                contact: "Связь с нами:"
            },
            en: {
                text: "We are currently performing scheduled maintenance on our servers to update our infrastructure. We will be back soon.",
                contact: "Contact us:"
            }
        };

        const lang = navigator.language.startsWith('ru') ? 'ru' : 'en';
        document.getElementById('text').innerText = content[lang].text;
        document.getElementById('contact-text').innerText = content[lang].contact;
    </script>
</body>
</html>
